{% extends "catalog/base.html" %}
{% block title %}Удаление книги{% endblock %}
{% block content %}
  <h2>🗑 Удаление книги</h2>
  <p>Вы уверены, что хотите удалить:</p>
  <h3>"{{ book.title }}"</h3>
  <form method="post">
    {% csrf_token %}
    <button type="submit" style="background: #e74c3c; color: white; padding: 10px; border: none; cursor: pointer;">Да, удалить</button>
    <a href="{% url 'book_detail' pk=book.pk %}" style="margin-left: 10px;">Отмена</a>
  </form>
{% endblock %}
