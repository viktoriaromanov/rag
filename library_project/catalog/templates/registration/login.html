{% extends "catalog/base.html" %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
  <h2> Вход</h2>
  <div class="auth-form">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться</a></p>
  </div>
{% endblock %}
