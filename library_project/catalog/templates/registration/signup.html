{% extends "catalog/base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
  <h2> Регистрация</h2>
  <div class="auth-form">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
  </div>
{% endblock %}
