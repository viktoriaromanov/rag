{% if tags %}
<div class="card mb-3">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-tags"></i> Популярные теги</h5>
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-2">
            {% for tag in tags %}
            <a href="{% url 'catalog:books_by_tag' tag.slug %}" 
               class="badge bg-primary text-decoration-none"
               style="font-size: 0.9rem; padding: 0.5em 0.8em;">
                {{ tag.name }} ({{ tag.num_times }})
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
